<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心灵港湾</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f4fbf7; --surface: rgba(255, 255, 255, 0.76); --surface-soft: rgba(255, 255, 255, 0.56);
    --border: rgba(125, 176, 156, 0.18); --primary: #7fcf9b; --secondary: #ffd88d;
    --text: #2d4a3f; --dim: #6b8d80; --muted: #8fa89d;
  }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif;
    background:
      radial-gradient(circle at 16% 14%, rgba(255, 231, 176, 0.34), transparent 22%),
      radial-gradient(circle at 82% 12%, rgba(246, 188, 206, 0.28), transparent 22%),
      radial-gradient(circle at 28% 62%, rgba(255, 248, 238, 0.45), transparent 24%),
      radial-gradient(circle at 50% 100%, rgba(213, 236, 226, 0.55), transparent 34%),
      linear-gradient(180deg, #d8e7de 0%, #d2e1d9 45%, #d7e6de 100%);
    color: var(--text);
    height: 100vh; height: 100dvh; overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }

  /* ── 入口页 ── */
  .entry-page {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.03));
    position: relative; overflow: hidden;
  }
  .entry-page::before,
  .entry-page::after {
    content: '';
    position: absolute;
    border-radius: 999px;
    filter: blur(6px);
    opacity: .75;
    animation: floatDrift 12s ease-in-out infinite;
  }
  .entry-page::before {
    width: 220px; height: 220px; left: -60px; bottom: -70px;
    background: radial-gradient(circle, rgba(255, 245, 235, 0.42), transparent 65%);
  }
  .entry-page::after {
    width: 180px; height: 180px; right: -40px; top: 70px;
    background: radial-gradient(circle, rgba(244, 191, 205, 0.24), transparent 68%);
    animation-delay: -5s;
  }
  .page-art {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .page-art span {
    position: absolute;
    display: block;
  }
  .cloud-bear {
    width: min(54vw, 460px);
    height: min(42vw, 320px);
    left: -6vw;
    top: 16vh;
    border-radius: 48% 52% 45% 55% / 42% 38% 62% 58%;
    background: linear-gradient(145deg, rgba(255,255,250,0.92), rgba(245,241,228,0.94));
    box-shadow:
      inset -18px -16px 0 rgba(223, 216, 198, 0.38),
      0 18px 48px rgba(114, 128, 117, 0.12);
    filter: blur(.2px);
  }
  .cloud-bear::before,
  .cloud-bear::after {
    content: '';
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }
  .cloud-bear::before {
    width: 36%;
    height: 38%;
    left: 4%;
    top: 8%;
  }
  .cloud-bear::after {
    width: 22%;
    height: 24%;
    right: 10%;
    top: -5%;
  }
  .pink-orb {
    width: min(28vw, 250px);
    height: min(28vw, 250px);
    right: 18vw;
    top: 11vh;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255, 214, 224, 0.96), rgba(237, 161, 182, 0.74) 62%, rgba(237, 161, 182, 0.1) 74%);
    box-shadow: 0 12px 36px rgba(203, 143, 161, 0.16);
  }
  .pink-orb::before,
  .pink-orb::after {
    content: '';
    position: absolute;
    top: -6%;
    width: 22%;
    height: 26%;
    background: linear-gradient(180deg, rgba(255, 198, 214, 0.95), rgba(233, 144, 171, 0.82));
    border-radius: 42% 58% 48% 52%;
  }
  .pink-orb::before {
    left: 16%;
    transform: rotate(-24deg);
  }
  .pink-orb::after {
    right: 16%;
    transform: rotate(24deg);
  }
  .pink-face {
    width: min(18vw, 155px);
    height: min(18vw, 155px);
    right: 23vw;
    top: 16vh;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 34%, rgba(255, 235, 239, 0.96), rgba(255, 205, 218, 0.84) 70%, rgba(255, 205, 218, 0.2) 78%);
    box-shadow: inset 0 -10px 18px rgba(230, 166, 184, 0.28);
  }
  .pink-face::before,
  .pink-face::after {
    content: '';
    position: absolute;
    top: 46%;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6bbf77;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.55);
  }
  .pink-face::before { left: 34%; }
  .pink-face::after { right: 34%; }
  .smile-dot {
    width: 38px;
    height: 18px;
    right: 27.5vw;
    top: 24.2vh;
    border-bottom: 4px solid rgba(211, 118, 138, 0.76);
    border-radius: 0 0 20px 20px;
  }
  .cape-slice {
    width: min(40vw, 360px);
    height: min(70vh, 620px);
    right: 16vw;
    top: -4vh;
    background: linear-gradient(180deg, rgba(41, 35, 36, 0.86), rgba(62, 48, 43, 0.92));
    clip-path: polygon(28% 0, 100% 0, 76% 100%, 0 78%);
    box-shadow: 0 18px 50px rgba(40, 34, 35, 0.16);
    transform: rotate(2deg);
  }
  .cape-slice::before {
    content: '';
    position: absolute;
    left: 12%;
    top: 10%;
    width: 18%;
    height: 20%;
    background: rgba(228, 52, 66, 0.7);
    clip-path: polygon(0 0, 100% 10%, 18% 100%);
  }
  .gold-ribbon {
    width: min(32vw, 300px);
    height: 20px;
    right: 17vw;
    top: 48vh;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(189, 144, 53, 0.94), rgba(242, 210, 122, 0.95), rgba(181, 135, 49, 0.92));
    box-shadow: 0 8px 18px rgba(181, 135, 49, 0.18);
    transform: rotate(-4deg);
  }
  .gold-ribbon::before {
    content: '';
    position: absolute;
    inset: 5px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255, 243, 209, 0.6);
  }
  .spark {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(255, 244, 186, 0.9);
    box-shadow: 0 0 18px rgba(255, 236, 168, 0.48);
  }
  .spark.s1 { top: 16vh; left: 56vw; }
  .spark.s2 { top: 24vh; left: 66vw; width: 9px; height: 9px; }
  .spark.s3 { top: 62vh; right: 20vw; width: 10px; height: 10px; }
  .paws {
    width: min(18vw, 160px);
    height: 56px;
    left: 14vw;
    bottom: 14vh;
    border-radius: 999px;
    background:
      radial-gradient(circle at 18% 50%, rgba(255, 247, 238, 0.95) 0 22px, transparent 23px),
      radial-gradient(circle at 50% 50%, rgba(255, 247, 238, 0.95) 0 22px, transparent 23px),
      radial-gradient(circle at 82% 50%, rgba(255, 247, 238, 0.95) 0 22px, transparent 23px);
    opacity: .92;
    filter: drop-shadow(0 10px 16px rgba(114, 128, 117, 0.12));
  }
  .soft-tail {
    width: min(24vw, 210px);
    height: min(18vw, 150px);
    right: -3vw;
    top: 18vh;
    border-radius: 54% 46% 60% 40%;
    background: linear-gradient(145deg, rgba(255, 249, 241, 0.92), rgba(238, 231, 219, 0.9));
    transform: rotate(28deg);
    box-shadow: inset -12px -10px 0 rgba(223, 216, 198, 0.28);
  }
  .entry-box {
    width: min(360px, calc(100vw - 32px));
    padding: 28px 22px 24px;
    animation: fadeUp .7s ease-out;
    text-align: center;
    background: rgba(255, 255, 255, 0.64);
    border: 1px solid rgba(125, 176, 156, 0.16);
    box-shadow: 0 22px 48px rgba(116, 163, 142, 0.14);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 28px;
    position: relative;
    z-index: 1;
  }
  .entry-box::before {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 22px;
    pointer-events: none;
    border: 1px solid rgba(255, 255, 255, 0.42);
  }
  .duo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(125, 176, 156, 0.16);
    box-shadow: 0 8px 18px rgba(116, 163, 142, 0.1);
    font-size: 12px;
    color: #6f8e82;
    letter-spacing: .5px;
  }
  .duo-badge strong {
    color: #4f7e6a;
    font-weight: 700;
  }
  .duo-pill-flower,
  .duo-pill-bond {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .duo-pill-flower {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background:
      radial-gradient(circle at center, #ffe085 0 22%, #d7902c 23% 30%, transparent 31%),
      radial-gradient(circle at 50% 8%, #ffb6d5 0 24%, transparent 25%),
      radial-gradient(circle at 82% 24%, #ffb6d5 0 24%, transparent 25%),
      radial-gradient(circle at 82% 74%, #ffb6d5 0 24%, transparent 25%),
      radial-gradient(circle at 50% 92%, #ffb6d5 0 24%, transparent 25%),
      radial-gradient(circle at 18% 74%, #ffb6d5 0 24%, transparent 25%),
      radial-gradient(circle at 18% 24%, #ffb6d5 0 24%, transparent 25%);
    filter: drop-shadow(0 2px 4px rgba(222, 145, 174, 0.18));
  }
  .duo-pill-bond {
    width: 18px;
    height: 18px;
    font-size: 15px;
    line-height: 1;
  }
  .logo-fire {
    width: 126px; height: 126px; margin: 0 auto 10px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    border-radius: 38px;
    background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(248, 239, 241, 0.76));
    border: 1px solid rgba(205, 224, 214, 0.72);
    box-shadow:
      inset 0 2px 0 rgba(255, 255, 255, 0.72),
      0 16px 30px rgba(157, 180, 168, 0.16);
    animation: floatDrift 6s ease-in-out infinite;
    overflow: hidden;
  }
  .logo-fire::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 28% 28%, rgba(197, 230, 203, 0.18), transparent 22%),
      radial-gradient(circle at 72% 30%, rgba(255, 204, 216, 0.18), transparent 20%);
  }
  .logo-bond,
  .logo-bond-tail,
  .logo-cape,
  .logo-ribbon,
  .logo-anya-hair,
  .logo-anya-face,
  .logo-anya-arm {
    position: relative;
    z-index: 1;
  }
  .logo-bond {
    position: absolute;
    left: 16px;
    bottom: 20px;
    width: 58px;
    height: 68px;
    border-radius: 48% 48% 44% 42%;
    background: linear-gradient(160deg, rgba(255,255,250,0.98), rgba(241, 236, 226, 0.96));
    box-shadow: inset -6px -8px 0 rgba(221, 214, 200, 0.38);
  }
  .logo-bond::before {
    content: '';
    position: absolute;
    left: 6px;
    top: -15px;
    width: 34px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(160deg, rgba(255,255,250,0.98), rgba(241, 236, 226, 0.96));
  }
  .logo-bond::after {
    content: '';
    position: absolute;
    right: -12px;
    top: 2px;
    width: 28px;
    height: 30px;
    border-radius: 70% 30% 70% 30%;
    background: linear-gradient(160deg, rgba(255,255,250,0.98), rgba(241, 236, 226, 0.96));
    transform: rotate(22deg);
  }
  .logo-bond-tail {
    position: absolute;
    right: 10px;
    top: 24px;
    width: 42px;
    height: 74px;
    border-radius: 52% 48% 64% 36%;
    background: linear-gradient(160deg, rgba(255,255,250,0.92), rgba(236, 229, 217, 0.9));
    transform: rotate(28deg);
    box-shadow: inset -8px -8px 0 rgba(221, 214, 200, 0.26);
  }
  .logo-cape {
    content: '';
    position: absolute;
    right: 26px;
    top: 14px;
    width: 44px;
    height: 88px;
    background: linear-gradient(180deg, rgba(46, 40, 41, 0.92), rgba(76, 61, 54, 0.94));
    clip-path: polygon(28% 0, 100% 0, 70% 100%, 0 80%);
    transform: rotate(3deg);
  }
  .logo-cape::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 8px;
    width: 12px;
    height: 18px;
    background: rgba(210, 58, 68, 0.76);
    clip-path: polygon(0 0, 100% 16%, 18% 100%);
  }
  .logo-ribbon {
    position: absolute;
    right: 24px;
    bottom: 30px;
    width: 46px;
    height: 10px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(189, 144, 53, 0.94), rgba(242, 210, 122, 0.95), rgba(181, 135, 49, 0.92));
    transform: rotate(-5deg);
    box-shadow: 0 4px 10px rgba(181, 135, 49, 0.18);
  }
  .logo-anya-hair {
    position: absolute;
    right: 26px;
    top: 32px;
    width: 40px;
    height: 48px;
    border-radius: 52% 48% 46% 54%;
    background: linear-gradient(160deg, #f7b4cb, #ef8daf);
    box-shadow: inset -6px -8px 0 rgba(222, 139, 168, 0.22);
  }
  .logo-anya-hair::before,
  .logo-anya-hair::after {
    content: '';
    position: absolute;
    top: -4px;
    width: 12px;
    height: 14px;
    background: linear-gradient(180deg, #f5c2d5, #ee8eb1);
    border-radius: 46% 54% 50% 50%;
  }
  .logo-anya-hair::before {
    left: 2px;
    transform: rotate(-26deg);
  }
  .logo-anya-hair::after {
    right: 2px;
    transform: rotate(26deg);
  }
  .logo-anya-face {
    position: absolute;
    right: 32px;
    top: 42px;
    width: 26px;
    height: 24px;
    border-radius: 48%;
    background: linear-gradient(180deg, #fff0ef, #ffe3e2);
  }
  .logo-anya-face::before,
  .logo-anya-face::after {
    content: '';
    position: absolute;
    top: 8px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #76b85d;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.55);
  }
  .logo-anya-face::before { left: 5px; }
  .logo-anya-face::after { right: 5px; }
  .logo-anya-arm {
    position: absolute;
    right: 12px;
    top: 56px;
    width: 22px;
    height: 8px;
    border-radius: 999px;
    background: linear-gradient(90deg, #fff0ef, #f7d5d3);
    transform: rotate(-18deg);
  }
  .logo-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 30px; font-weight: 700; letter-spacing: 4px; margin: 10px 0 8px;
    background: linear-gradient(90deg, #487866, #67b389 52%, #e7b65f);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-sub { color: #6f8e82; font-size: 12px; letter-spacing: 1px; line-height: 1.8; margin-bottom: 24px; }
  .character-note {
    margin: -8px auto 18px;
    width: fit-content;
    max-width: 100%;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255, 247, 250, 0.68);
    border: 1px solid rgba(244, 191, 205, 0.24);
    color: #8f6b74;
    font-size: 11px;
    line-height: 1.5;
  }

  .field { margin-bottom: 14px; text-align: left; }
  .field label { font-size: 11px; color: #739183; letter-spacing: 2px; display: block; margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 13px 16px; font-size: 14px;
    background: rgba(255, 255, 255, 0.82); border: 1px solid var(--border); border-radius: 16px;
    color: var(--text); outline: none; transition: border .3s;
    font-family: inherit;
  }
  .field input:focus {
    border-color: rgba(127, 207, 155, 0.74);
    box-shadow: 0 0 0 4px rgba(127, 207, 155, 0.12);
  }
  .field input::placeholder { color: #9db3aa; }

  .enter-btn {
    width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
    background: linear-gradient(135deg, #7fcf9b, #9fe2bb 52%, #ffe29f);
    color: #355746; border: none; border-radius: 16px; cursor: pointer;
    letter-spacing: 3px; margin-top: 10px;
    box-shadow: 0 12px 28px rgba(127, 207, 155, 0.2);
    transition: transform .2s, box-shadow .2s; font-family: inherit;
  }
  .enter-btn:active { transform: scale(.97); box-shadow: 0 8px 20px rgba(127, 207, 155, 0.16); }
  .enter-note { color: #739183; font-size: 11px; margin-top: 16px; line-height: 1.9; }

  .share-section { margin-top: 18px; }
  .share-btn {
    width: 100%; padding: 12px; font-size: 13px;
    background: rgba(255, 255, 255, 0.42); border: 1px dashed rgba(125, 176, 156, 0.24); border-radius: 14px;
    color: #5b8976; cursor: pointer; letter-spacing: 1px; font-family: inherit;
    transition: all .2s;
  }
  .share-btn:active { background: rgba(127, 207, 155, 0.08); border-color: rgba(127, 207, 155, 0.52); }
  .share-hint { font-size: 11px; color: #89a195; margin-top: 8px; }

  /* ── 聊天页 ── */
  .chat-page { flex: 1; display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  .top-bar {
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(125, 176, 156, 0.12); background: rgba(255, 255, 255, 0.84);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); flex-shrink: 0;
    box-shadow: 0 8px 20px rgba(116, 163, 142, 0.05);
  }
  .top-left { display: flex; align-items: center; gap: 10px; }
  .top-title { font-size: 15px; font-weight: 700; color: #477766; letter-spacing: 1px; }
  .top-sub { font-size: 10px; color: #89a195; font-family: monospace; }
  .top-right { display: flex; align-items: center; gap: 8px; }
  .top-nick {
    font-size: 11px; color: #729181; font-family: monospace;
    padding: 6px 10px; border-radius: 999px; background: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(125, 176, 156, 0.16);
    box-shadow: 0 6px 14px rgba(116, 163, 142, 0.05);
  }
  .duo-mini {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-right: 4px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(244, 191, 205, 0.22);
    color: #876a73;
    font-size: 11px;
    white-space: nowrap;
    box-shadow: 0 6px 14px rgba(222, 145, 174, 0.05);
  }

  .status-bar {
    padding: 7px 16px; font-size: 10px; text-align: center;
    font-family: monospace; flex-shrink: 0;
    margin: 8px 12px 0;
    border-radius: 999px;
    background: rgba(255,255,255,0.8);
    border: 1px solid rgba(125, 176, 156, 0.12);
    box-shadow: 0 8px 18px rgba(116, 163, 142, 0.04);
  }
  .status-bar.online { color: #58a76f; background: rgba(255,255,255,0.9); }
  .status-bar.offline { color: #d97575; background: rgba(255,255,255,0.9); }
  .status-bar.connecting { color: #d4a352; background: rgba(255,255,255,0.9); }
  .status-help {
    margin: 8px 12px 0;
    padding: 10px 12px;
    border-radius: 18px;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(125, 176, 156, 0.12);
    box-shadow: 0 8px 18px rgba(116, 163, 142, 0.04);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: #789286;
    font-size: 11px;
    line-height: 1.6;
  }
  .status-help.hidden { display: none; }
  .status-help-text {
    min-width: 0;
    flex: 1;
  }
  .status-help-btn {
    flex-shrink: 0;
    padding: 8px 12px;
    border: none;
    border-radius: 999px;
    background: rgba(255,255,255,0.94);
    border: 1px solid rgba(125, 176, 156, 0.16);
    color: #4f7e6a;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(116, 163, 142, 0.05);
  }
  .status-help-btn:active { transform: scale(.98); }

  .msg-area {
    flex: 1; overflow-y: auto; padding: 16px 14px;
    -webkit-overflow-scrolling: touch;
  }
  .msg-area::-webkit-scrollbar { width: 3px; }
  .msg-area::-webkit-scrollbar-thumb { background: rgba(125, 176, 156, 0.2); border-radius: 3px; }

  .empty-hint { text-align: center; margin-top: 72px; color: #7d9589; }
  .empty-hint .icon { font-size: 48px; opacity: .7; margin-bottom: 12px; }
  .empty-hint p { font-size: 13px; letter-spacing: 1px; }
  .empty-hint .sub { font-size: 11px; color: #8da59a; margin-top: 6px; line-height: 1.7; }
  .empty-cast {
    margin-top: 14px;
    display: inline-flex;
    gap: 10px;
    align-items: center;
    color: #906d76;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.58);
    border: 1px solid rgba(244, 191, 205, 0.18);
  }

  .msg-row { display: flex; margin-bottom: 12px; animation: slideUp .3s ease-out; }
  .msg-row.mine { justify-content: flex-end; }
  .msg-row.theirs { justify-content: flex-start; }

  .msg-bubble {
    max-width: 75%; padding: 11px 15px; border-radius: 16px;
    position: relative; overflow: hidden; transition: opacity .8s;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .msg-row.mine .msg-bubble {

  .msg-row.theirs .msg-bubble {

  .msg-sender { font-size: 10px; color: #b7873d; font-weight: 700; letter-spacing: 1px; margin-bottom: 3px; }
  .msg-text { font-size: 14px; line-height: 1.6; word-break: break-word; color: #2f463d; }
  .msg-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
  .msg-time { font-size: 10px; color: #8da298; font-family: monospace; }
  .msg-status { font-size: 10px; font-family: monospace; }
  .msg-status.sent { color: #69ab7e; }

  /* 输入区 */
  .input-bar {
    padding: 10px 14px 14px; border-top: 1px solid rgba(125, 176, 156, 0.12);
    background: rgba(255, 255, 255, 0.58); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
    flex-shrink: 0; display: flex; gap: 10px; align-items: flex-end;
  }
  .input-bar textarea {
    flex: 1; padding: 12px 14px; font-size: 14px; background: rgba(255, 255, 255, 0.86);
    border: 1px solid var(--border); border-radius: 16px; color: var(--text);
    outline: none; resize: none; line-height: 1.5; font-family: inherit;
    max-height: 100px; transition: border .3s;
  }
  .input-bar textarea:focus {
    border-color: rgba(127, 207, 155, 0.74);
    box-shadow: 0 0 0 4px rgba(127, 207, 155, 0.12);
  }
  .input-bar textarea::placeholder { color: #9db3aa; }
  .send-btn {
    width: 44px; height: 44px; border-radius: 14px; border: none;
    background: rgba(255, 255, 255, 0.75); color: #8aa697; font-size: 18px; cursor: default;
    display: flex; align-items: center; justify-content: center;
    transition: all .3s; flex-shrink: 0; font-family: inherit;
  }
  .send-btn.active {
    background: linear-gradient(135deg, #7fcf9b, #b4e8c7 52%, #ffe29f);
    color: #355746; cursor: pointer; box-shadow: 0 8px 24px rgba(127, 207, 155, 0.24);
  }
  .send-btn:active.active { transform: scale(.93); }

  .toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(69, 109, 92, 0.92); color: #fff; padding: 12px 24px; border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    font-size: 13px; z-index: 100; animation: fadeUp .3s ease-out;
    pointer-events: none;

  /* 动画 */
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%,75%{transform:translateX(-5px)} 50%{transform:translateX(5px)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes floatDrift { 0%,100%{transform:translateY(0) translateX(0)} 50%{transform:translateY(-10px) translateX(6px)} }
  @media (max-width: 720px) {

<body>
<div class="page-art" aria-hidden="true">

<!-- ═══ 入口页 ═══ -->
<div class="entry-page" id="entryPage">
  <div class="entry-box">
    <div class="duo-badge"><span class="duo-pill-flower" aria-hidden="true"></span><strong>阿尼亚</strong><span>×</span><strong>邦德</strong><span class="duo-pill-bond" aria-hidden="true">🐻‍❄️</span></div>
    <div class="logo-fire" aria-hidden="true">
      <span class="logo-bond"></span>
      <span class="logo-bond-tail"></span>
      <span class="logo-cape"></span>
      <span class="logo-ribbon"></span>

    </div>
    <div class="logo-title">心灵港湾</div>

    <div class="field">

    <div class="field">

    <button class="enter-btn" id="enterBtn">轻轻进入</button>

    <div class="share-section">
      <button class="share-btn" id="shareBtn">复制邀请链接，约对方来晒晒太阳</button>
      <div class="share-hint" id="shareHint">输入暗号后可生成一条温柔的邀请链接</div>
    </div>

    <div class="enter-note">
      消息会加密传输<br>这里不着急，适合分享日常、情绪和一点点小确幸
    </div>
  </div>
</div>

<!-- ═══ 聊天页 ═══ -->
<div class="chat-page" id="chatPage" style="display:none">
  <div class="top-bar">
    <div class="top-left">
      <span style="font-size:20px">🌼</span>
      <div>
        <div class="top-title">心灵港湾</div>
        <div class="top-sub">阿尼亚 × 邦德陪你聊天 · 把今天过成晴天一点点</div>
      </div>
    </div>
    <div class="top-right">
      <span class="duo-mini">🌸 阿尼亚 · 🐻‍❄️ 邦德</span>
      <span class="top-nick" id="topNick"></span>
    </div>
  </div>

  <div class="status-bar connecting" id="statusBar">连接中…</div>
  <div class="status-help" id="statusHelp">
    <div class="status-help-text" id="statusHelpText">第一次连接可能会慢一点，先等几秒；如果对方也在同一页面，请确认你们输入的是同一个暗号。</div>
    <button class="status-help-btn" id="retryBtn">重试连接</button>
  </div>

  <div class="msg-area" id="msgArea">
    <div class="empty-hint" id="emptyHint">
      <div class="icon">🌤️</div>
      <p>这里正等一句温柔的开场</p>
      <div class="sub">聊聊今天的风、云、心情，或者一件让你微微开心的小事</div>
      <div class="empty-cast">🌸 阿尼亚负责可爱气氛，🐻‍❄️ 邦德负责治愈陪伴</div>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="msgInput" rows="1" placeholder="写下今天想分享的心情… (Enter 发送)"></textarea>
    <button class="send-btn" id="sendBtn">↑</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── 配置 ──
  const MQTT_WS = 'wss://broker.emqx.io:8084/mqtt'; // EMQX 官方示例 WebSocket 地址
  const TOPIC_PREFIX = 'heart-harbor-2026/';

  // ── 简易 AES 加密（兼容微信 WebView） ──
  // 微信部分机型不支持 crypto.subtle，用 RC4 流加密兜底
  function rc4(key, str) {
    const s = [];
    let j = 0, res = '';
    for (let i = 0; i < 256; i++) s[i] = i;
    for (let i = 0; i < 256; i++) {
      j = (j + s[i] + key.charCodeAt(i % key.length)) & 255;
      [s[i], s[j]] = [s[j], s[i]];
    }
    let i = 0; j = 0;
    for (let k = 0; k < str.length; k++) {
      i = (i + 1) & 255;
      j = (j + s[i]) & 255;
      [s[i], s[j]] = [s[j], s[i]];
      res += String.fromCharCode(str.charCodeAt(k) ^ s[(s[i] + s[j]) & 255]);
    }
    return res;
  }

  function encryptText(text, password) {
    const salt = 'harbor2026';
    const key = password + salt;
    const encrypted = rc4(key, text);
    return btoa(unescape(encodeURIComponent(encrypted)));
  }

  function decryptText(b64, password) {
    try {
      const salt = 'harbor2026';
      const key = password + salt;
      const encrypted = decodeURIComponent(escape(atob(b64)));
      return rc4(key, encrypted);
    } catch { return null; }
  }

  // ── 生成房间 ID ──
  function makeRoomId(secret) {
    let hash = 0;
    const s = 'room:' + secret;
    for (let i = 0; i < s.length; i++) hash = ((hash << 5) - hash + s.charCodeAt(i)) | 0;
    return 'r' + Math.abs(hash).toString(36);
  }

  // ── 极简 MQTT over WebSocket 客户端 ──
  // 只实现 CONNECT / SUBSCRIBE / PUBLISH / PINGREQ
  class TinyMQTT {
    constructor(url, opts = {}) {
      this.url = url;
      this.clientId = 'hh_' + Math.random().toString(36).slice(2, 10);
      this.onMessage = opts.onMessage || (() => {});
      this.onStatus = opts.onStatus || (() => {});
      this.subs = [];
      this.ws = null;
      this.alive = false;
      this.pingTimer = null;
      this.reconnTimer = null;
    }

    connect() {
      this.onStatus('connecting');
      try {
        this.ws = new WebSocket(this.url, 'mqtt');
        this.ws.binaryType = 'arraybuffer';
      } catch (e) {
        this.onStatus('offline');
        this._scheduleReconnect();
        return;
      }
      this.ws.onopen = () => this._sendConnect();
      this.ws.onmessage = (e) => this._onData(new Uint8Array(e.data));
      this.ws.onclose = () => { this.alive = false; this.onStatus('offline'); this._scheduleReconnect(); };
      this.ws.onerror = () => {};
    }

    _scheduleReconnect() {
      clearTimeout(this.reconnTimer);
      this.reconnTimer = setTimeout(() => this.connect(), 3000);
    }

    _sendConnect() {
      const id = this._encStr(this.clientId);
      const varHeader = [0x00, 0x04, 0x4D, 0x51, 0x54, 0x54, 0x04, 0x02, 0x00, 0x3C];
      const payload = [...id];
      const rem = varHeader.length + payload.length;
      const pkt = [0x10, ...this._encLen(rem), ...varHeader, ...payload];
      this._send(pkt);
    }

    subscribe(topic) {
      if (!this.subs.includes(topic)) this.subs.push(topic);
      if (!this.alive) return;
      const t = this._encStr(topic);
      const msgId = [0x00, 0x01];
      const rem = msgId.length + t.length + 1;
      this._send([0x82, ...this._encLen(rem), ...msgId, ...t, 0x00]);
    }

    publish(topic, message) {
      const t = this._encStr(topic);
      const m = Array.from(new TextEncoder().encode(message));
      const rem = t.length + m.length;
      this._send([0x30, ...this._encLen(rem), ...t, ...m]);
    }

    _onData(buf) {
      const type = buf[0] >> 4;
      if (type === 2) { // CONNACK
        this.alive = true;
        this.onStatus('online');
        this.subs.forEach(t => this.subscribe(t));
        clearInterval(this.pingTimer);
        this.pingTimer = setInterval(() => this._send([0xC0, 0x00]), 25000);
      } else if (type === 3) { // PUBLISH
        let offset = 1;
        let rem = 0, mul = 1;
        do { const b = buf[offset++]; rem += (b & 127) * mul; mul *= 128; } while (buf[offset - 1] & 128);
        const topicLen = (buf[offset] << 8) | buf[offset + 1]; offset += 2;
        offset += topicLen;
        const payload = new TextDecoder().decode(buf.slice(offset));
        this.onMessage(payload);
      }
    }

    _send(bytes) {
      if (this.ws && this.ws.readyState === 1) this.ws.send(new Uint8Array(bytes));
    }
    _encStr(s) {
      const b = Array.from(new TextEncoder().encode(s));
      return [(b.length >> 8) & 0xFF, b.length & 0xFF, ...b];
    }
    _encLen(n) {
      const r = [];
      do { let b = n & 127; n >>= 7; if (n > 0) b |= 128; r.push(b); } while (n > 0);
      return r;
    }

    destroy() {
      clearInterval(this.pingTimer);
      clearTimeout(this.reconnTimer);
      if (this.ws) { this.ws.onclose = null; this.ws.close(); }
    }
  }

  // ── 全局状态 ──
  let nickname = '';
  let secret = '';
  let roomId = '';
  let mqtt = null;
  const sessionId = 'session_' + Math.random().toString(36).slice(2, 10);
  let messages = []; // { id, sender, text, time }

  // ── DOM ──
  const $ = id => document.getElementById(id);

  // ── Toast ──
  function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast'; el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }

  function updateStatusUi(status) {
    const bar = $('statusBar');
    const help = $('statusHelp');
    const helpText = $('statusHelpText');
    bar.className = 'status-bar ' + status;

    if (status === 'online') {
      bar.textContent = '🟢 已连接，今天可以慢慢聊';
      help.classList.remove('hidden');
      helpText.textContent = '已经连上啦。现在只要对方也打开链接，并输入同一个暗号，你们就能互相收到消息。';
      return;
    }

    if (status === 'connecting') {
      bar.textContent = '🟡 正在轻轻连接中…';
      help.classList.remove('hidden');
      helpText.textContent = '第一次连接可能会慢一点，先等几秒；如果对方也在同一页面，请确认你们输入的是同一个暗号。';
      return;
    }

    bar.textContent = '🔴 暂时断开，正在帮你重新连上';
    help.classList.remove('hidden');
    helpText.textContent = '如果一直断线，可以先点“重试连接”；也可以让对方刷新一次页面，并确认两边网络正常、暗号完全一致。';
  }

  // ── 入口页逻辑 ──
  $('nickInput').addEventListener('keydown', e => { if (e.key === 'Enter') $('secretInput').focus(); });
  $('secretInput').addEventListener('keydown', e => { if (e.key === 'Enter') enterChat(); });
  $('enterBtn').addEventListener('click', enterChat);
  $('retryBtn').addEventListener('click', () => {
    toast('正在重新连接…');
    reconnectMQTT();
  });

  $('shareBtn').addEventListener('click', () => {
    const s = $('secretInput').value.trim();
    if (!s) { toast('先写一个小小暗号吧'); return; }
    const rid = makeRoomId(s);
    const url = location.origin + location.pathname + '#' + rid;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => toast('邀请链接已复制，发给想聊天的人就好'));
    } else {
      const ta = document.createElement('textarea'); ta.value = url;
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); toast('邀请链接已复制');
    }
  });

  // 从 URL hash 自动填入房间
  if (location.hash && location.hash.length > 2) {
    $('shareHint').textContent = '已经找到同一片小港湾了，输入暗号就能进入';
    $('shareHint').style.color = '#73a889';
  }

  function enterChat() {
    nickname = $('nickInput').value.trim();
    secret = $('secretInput').value.trim();
    if (!nickname || !secret) {
      const box = document.querySelector('.entry-box');
      box.style.animation = 'shake .4s ease'; setTimeout(() => box.style.animation = '', 500);
      return;
    }
    roomId = makeRoomId(secret);
    // 更新 URL（不刷新页面）
    history.replaceState(null, '', '#' + roomId);

    $('entryPage').style.display = 'none';
    $('chatPage').style.display = 'flex';
    $('topNick').textContent = nickname;

    initMQTT();
    toast('已进入港湾，请让对方也打开链接并输入同一个暗号');
  }

  // ── MQTT 通信 ──
  function reconnectMQTT() {
    if (mqtt) mqtt.destroy();
    mqtt = null;
    updateStatusUi('connecting');
    initMQTT();
  }

  function initMQTT() {
    const topic = TOPIC_PREFIX + roomId;
    mqtt = new TinyMQTT(MQTT_WS, {
      onMessage: (payload) => {
        try {
          const obj = JSON.parse(payload);
          if (obj.type === 'msg') {
            const text = decryptText(obj.enc, secret);
            if (text === null) return; // 密钥不匹配
            if (obj.senderId && obj.senderId === sessionId) return; // 自己发的忽略
            if (messages.find(m => m.id === obj.id)) return; // 去重
            const msg = { id: obj.id, sender: obj.sender, text, time: obj.time };
            messages.push(msg);
            renderMessage(msg);
          }
        } catch {}
      },
      onStatus: (s) => {
        updateStatusUi(s);
      },
    });
    mqtt.connect();
    mqtt.subscribe(topic);
  }

  // ── 发送消息 ──
  $('sendBtn').addEventListener('click', sendMessage);
  $('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  $('msgInput').addEventListener('input', () => {
    const input = $('msgInput');
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    const btn = $('sendBtn');
    if (input.value.trim()) btn.classList.add('active');
    else btn.classList.remove('active');
  });

  function sendMessage() {
    const text = $('msgInput').value.trim();
    if (!text || !mqtt) return;
    if (!mqtt.alive) {
      toast('现在还没连上，先等等或点一下“重试连接”');
      return;
    }

    const msg = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      sender: nickname, text, time: Date.now(),
    };
    messages.push(msg);
    renderMessage(msg);

    const enc = encryptText(text, secret);
    mqtt.publish(TOPIC_PREFIX + roomId, JSON.stringify({
      type: 'msg', id: msg.id, senderId: sessionId, sender: nickname, enc, time: msg.time,
    }));

    $('msgInput').value = '';
    $('msgInput').style.height = 'auto';
    $('sendBtn').classList.remove('active');
  }

  // ── 渲染消息 ──
  function renderMessage(msg) {
    $('emptyHint').style.display = 'none';
    const area = $('msgArea');
    const isMine = msg.sender === nickname;

    const row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
    row.id = 'msg-' + msg.id;

    const timeStr = new Date(msg.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

    row.innerHTML = `
      <div class="msg-bubble">
        ${!isMine ? `<div class="msg-sender">${esc(msg.sender)}</div>` : ''}
        <div class="msg-text">${esc(msg.text)}</div>
        <div class="msg-meta">
          <span class="msg-time">${timeStr}</span>
          ${isMine ? `<span class="msg-status sent">已送出</span>` : ''}
        </div>
      </div>
    `;
    area.appendChild(row);
    row.scrollIntoView({ behavior: 'smooth' });
  }

  function esc(s) {
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  // ── 页面关闭时断开 ──
  window.addEventListener('beforeunload', () => { if (mqtt) mqtt.destroy(); });

})();
</script>
